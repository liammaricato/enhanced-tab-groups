<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Tab Groups</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="popup-container">
        <h1>Enhanced Tab Groups ⚡️</h1>
        <div id="current-group">
            <span id="current-group-title"></span>
            <button id="sync-group-button">Sync Group</button>
        </div>
        <div id="groups-container">
            <div id="search-groups-container">
                <input type="text" id="search-groups-input" placeholder="Search groups">
            </div>
            <!-- Dynamically loaded groups list -->
            <div id="groups-list" class="loading"></div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
